<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Page not found - BizTracker" />
    <title>Page Not Found - BizTracker</title>
    <script>
      // Single Page App redirect script
      // This helps when using client-side routing with SPA
      (function() {
        // Get the path from the URL minus any query string
        const path = window.location.pathname;

        // Save the URL to sessionStorage
        sessionStorage.setItem('redirect', path);

        // Redirect to the base URL
        window.location.href = '/';
      })();
    </script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f5f5f5;
        color: #333;
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 500px;
      }
      h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
        color: #1976d2;
      }
      p {
        font-size: 1.25rem;
        margin-bottom: 2rem;
      }
      .message {
        margin-bottom: 2rem;
      }
      .redirect {
        font-size: 0.9rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <div class="message">
        <p>Page not found</p>
        <p>The page you are looking for doesn't exist or has been moved.</p>
      </div>
      <div class="redirect">
        <p>Redirecting to homepage...</p>
      </div>
    </div>
  </body>
</html>
